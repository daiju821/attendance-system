<!DOCTYPE html>
<html>
<head>
  <title>Professor Portal</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 360px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    .start { background: #22c55e; color: white; }
    .cancel { background: #ef4444; color: white; }
    .load { background: #3b82f6; color: white; }

    .box {
      margin-top: 15px;
      padding: 10px;
      background: #0f172a;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Professor Portal</h2>

  <input id="classCode" placeholder="Enter Class Code (ECE3A24)">

  <select id="day">
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Friday</option>
  </select>

  <button class="load" onclick="loadSchedule()">Load Schedule</button>

  <div class="box" id="scheduleBox">No schedule loaded</div>

  <!-- 🔥 THIS IS THE MISSING PART -->
  <button class="start" onclick="updateStatus('on-time')">
    Start Class
  </button>

  <button class="cancel" onclick="updateStatus('cancelled')">
    Cancel Class
  </button>

  <div id="result" class="box"></div>
</div>

<script>

const PROJECT_ID = "attendance-system-ee197";

// 🔥 SCHEDULE
const schedule = {
  Monday: "10:00 - 11:30",
  Tuesday: "11:30 - 14:30",
  Friday: "12:00 - 13:30"
};

// SHOW SCHEDULE
function loadSchedule() {
  let day = document.getElementById("day").value;

  document.getElementById("scheduleBox").innerText =
    day + " Schedule: " + schedule[day];
}

// 🔥 FIREBASE UPDATE
async function updateStatus(status) {

  let classCode = document.getElementById("classCode").value;

  if (!classCode) {
    alert("Enter class code first");
    return;
  }

  // 🔥 GET CURRENT DATE & TIME
  const now = new Date();

  const date = now.toISOString().split("T")[0]; // YYYY-MM-DD
  const time = now.toTimeString().split(" ")[0]; // HH:MM:SS

  const url = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/classStatus/${classCode}`;

  const data = {
    fields: {
      status: {
        stringValue: status
      },
      date: {
        stringValue: date
      },
      time: {
        stringValue: time
      },
      timestamp: {
        timestampValue: new Date().toISOString() // 🔥 FIREBASE TIME
      }
    }
  };

  try {
    const res = await fetch(url, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      document.getElementById("result").innerText =
        `Updated: ${status} | ${date} ${time}`;
    } else {
      document.getElementById("result").innerText =
        "Failed to update Firebase";
    }

  } catch (err) {
    document.getElementById("result").innerText =
      "Connection error";
  }
}

</script>

</body>
</html>
