<!DOCTYPE html>
<html>
<head>
  <title>Attendance Dashboard</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: white;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 900px;
      margin: 20px auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th {
      background: #667eea;
      color: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .present { background: green; color:white; }
    .late { background: orange; color:white; }
    .absent { background: red; color:white; }
  </style>
</head>

<body>

<h2>📊 Attendance Dashboard</h2>

<!-- ================= VIEWER ================= -->
<div class="card">

  <h3>Attendance Viewer</h3>

  <input type="date" id="datePicker">
  <select id="subjectSelect">
    <option>Subject1</option>
    <option>Subject2</option>
  </select>

  <button onclick="loadAttendance()">Load Attendance</button>

  <p><b>Day:</b> <span id="dayDisplay"></span></p>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Time-In</th>
        <th>Time-Out</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="attendanceTable"></tbody>
  </table>

</div>

<!-- ================= SUMMARY ================= -->
<div class="card">

  <h3>Attendance Monthly Summary</h3>

  <select id="summarySubject">
    <option>All Subjects</option>
    <option>Subject1</option>
    <option>Subject2</option>
  </select>

  <select id="studentFilter">
    <option>All Students</option>
    <option>Student1</option>
    <option>Student2</option>
  </select>

  <select id="monthFilter">
    <option value="1">January</option>
    <option value="2">February</option>
    <option value="3">March</option>
    <option value="4" selected>April</option>
    <option value="5">May</option>
  </select>

  <button onclick="loadSummary()">Load Summary</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Subject</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="summaryTable"></tbody>
  </table>

</div>

<script>

// 🔥 FIREBASE CONFIG 
const firebaseConfig = {
  apiKey: "AIzaSyDSS5WUym6RZwZuK6L-VDhwGqAoxhqF5OU",
  authDomain: "attendance-system-ee197.firebaseapp.com",
  projectId: "attendance-system-ee197",
  storageBucket: "attendance-system-ee197.firebasestorage.app",
  messagingSenderId: "378054948403",
  appId: "1:378054948403:web:787e35be89cbe58dc1d546"
};


firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];

// FORMAT DATE (MATCH ESP32)
function formatDate(input) {
  const d = new Date(input);
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

// GET DAY
function getDay(input) {
  return new Date(input).toLocaleString('en-US', { weekday: 'long' });
}

// DATE CHANGE
datePicker.addEventListener("change", () => {
  dayDisplay.innerText = getDay(datePicker.value);
});

// FETCH FIREBASE
async function fetchFirebase() {
  data = [];

  const snapshot = await db.collection("attendance").get();

  snapshot.forEach(doc => {
    const d = doc.data();

    data.push({
      name: d.name || "-",
      subject: d.subject || "-",
      date: d.date || "-",
      timeIn: d.timeIn || "-",
      timeOut: d.timeOut || "-",
      status: d.status || "-"
    });
  });
}

// ================= VIEWER =================
async function loadAttendance() {

  await fetchFirebase();

  const subject = subjectSelect.value;
  const date = formatDate(datePicker.value);

  attendanceTable.innerHTML = "";

  let merged = {};

  data.forEach(d => {

    if (d.subject === subject && d.date === date) {

      let key = d.name; // group by student

      if (!merged[key]) {
        merged[key] = {
          name: d.name,
          timeIn: "-",
          timeOut: "-",
          status: "-"
        };
      }

      // merge values
      if (d.timeIn && d.timeIn !== "-") {
        merged[key].timeIn = d.timeIn;
        merged[key].status = d.status;
      }

      if (d.timeOut && d.timeOut !== "-") {
        merged[key].timeOut = d.timeOut;

        // if no timeIn → Absent
        if (merged[key].timeIn === "-") {
          merged[key].status = "Absent";
        }
      }

      if (d.status === "Absent") {
        merged[key].status = "Absent";
      }
    }
  });

  // display merged data
  Object.values(merged).forEach(d => {

    let cls = d.status === "Absent" ? "absent" :
              d.status === "Present but Late" ? "late" : "present";

    attendanceTable.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.timeIn}</td>
        <td>${d.timeOut}</td>
        <td class="${cls}">${d.status}</td>
      </tr>
    `;
  });
}

// ================= SUMMARY =================
async function loadSummary() {

  await fetchFirebase();

  const subject = document.getElementById("summarySubject").value;
  const student = document.getElementById("studentFilter").value;
  const month = document.getElementById("monthFilter").value;

  summaryTable.innerHTML = "";

  data.forEach(d => {

    let dateObj = new Date(d.date);
    let matchMonth = (dateObj.getMonth()+1) == month;

    let matchSubject = (subject === "All Subjects" || d.subject === subject);
    let matchStudent = (student === "All Students" || d.name === student);

    if (matchMonth && matchSubject && matchStudent) {

      summaryTable.innerHTML += `
        <tr>
          <td>${d.name}</td>
          <td>${d.date}</td>
          <td>${d.subject}</td>
          <td>${d.status}</td>
        </tr>
      `;
    }
  });
}

</script>

</body>
</html>
